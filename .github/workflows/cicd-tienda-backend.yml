name: CI/CD Proyecto - Backend Ventas

on:
  push:
    branches: [ "main" ]
    paths:
      - "back-Ventas_SpringBoot/**"  # Ruta real de tu carpeta

jobs:
  build-push-deploy-backend:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout código
      uses: actions/checkout@v3

    - name: Configurar credenciales AWS
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Login en Amazon ECR
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build imagen y push a ECR
      run: |
        # Usamos la ruta exacta donde está tu pom.xml y Dockerfile
        REPO_URL=${{ secrets.ECR_REGISTRY }}/backend
        docker build -t backend ./back-Ventas_SpringBoot/Springboot-API-REST
        docker tag backend:latest $REPO_URL:latest
        docker push $REPO_URL:latest

    - name: Desplegar Backend vía SSM
      run: |
        REPO_URL=${{ secrets.ECR_REGISTRY }}/backend
        aws ssm send-command \
          --instance-ids ${{ secrets.EC2_BACKEND_INSTANCE_ID }} \
          --document-name "AWS-RunShellScript" \
          --parameters "{\"commands\":[
            \"set -e\",
            \"export AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}\",
            \"export AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}\",
            \"export AWS_SESSION_TOKEN=${{ secrets.AWS_SESSION_TOKEN }}\",
            \"export AWS_DEFAULT_REGION=${{ secrets.AWS_REGION }}\",
            \"aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | sudo docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}\",
            \"sudo docker pull $REPO_URL:latest\",
            \"sudo docker stop backend || true\",
            \"sudo docker rm backend || true\",
            \"sudo docker run -d --name backend-ventas -p 8080:8080 \-e DB_ENDPOINT=${{ secrets.DB_HOST }} \-e DB_PORT=3306 \-e DB_NAME=tienda_despachos \-e DB_USERNAME=root \-e DB_PASSWORD=${{ secrets.DB_PASSWORD }} \$REPO_URL:latest"
          ]}"
