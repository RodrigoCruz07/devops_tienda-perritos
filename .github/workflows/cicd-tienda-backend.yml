name: CI/CD Proyecto - Backend Ventas

on:
  push:
    branches: [ "main" ]
    paths:
      - "back-Ventas_SpringBoot/**"  # Ruta real de tu carpeta

jobs:
  build-push-deploy-backend:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout código
      uses: actions/checkout@v3

    - name: Configurar credenciales AWS
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Login en Amazon ECR
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build imagen y push a ECR
      run: |
        # Usamos la ruta exacta donde está tu pom.xml y Dockerfile
        REPO_URL=${{ secrets.ECR_REGISTRY }}/backend
        docker build -t backend ./back-Ventas_SpringBoot/Springboot-API-REST
        docker tag backend:latest $REPO_URL:latest
        docker push $REPO_URL:latest

    - name: Desplegar Backend Ventas vía SSM
      run: |
        aws ssm send-command \
          --instance-ids ${{ secrets.EC2_BACKEND_INSTANCE_ID }} \
          --document-name "AWS-RunShellScript" \
          --parameters '{
            "commands": [
              "aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | sudo docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}",
              "sudo docker pull ${{ secrets.ECR_REGISTRY }}/backend:latest",
              "sudo docker stop backend-ventas || true",
              "sudo docker rm backend-ventas || true",
             "sudo docker run -d --name backend-ventas -p 8080:8080 \
                -e SPRING_DATASOURCE_URL=\"jdbc:mysql://${{ secrets.DB_HOST_PRIVATE_IP }}:3306/${{ secrets.DB_NAME }}?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC\" \
                -e SPRING_DATASOURCE_USERNAME=\"${{ secrets.DB_USER }}\" \
                -e SPRING_DATASOURCE_PASSWORD=\"${{ secrets.DB_PASSWORD }}\" \
                -e DB_ENDPOINT=\"${{ secrets.DB_HOST_PRIVATE_IP }}\" \
                -e DB_PORT=3306 \
                -e DB_NAME=\"${{ secrets.DB_NAME }}\" \
                ${{ secrets.ECR_REGISTRY }}/backend:latest"
            ]
          }'
