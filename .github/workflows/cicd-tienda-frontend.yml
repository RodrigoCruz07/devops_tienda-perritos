name: CI/CD Proyecto - Frontend

on:
  push:
    branches: [ "main" ]
    paths:
      - "front_despacho/**"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Código
      uses: actions/checkout@v3

    - name: Configurar AWS
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Login en Amazon ECR
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build y Push a ECR
      run: |
        # Usamos una variable local para evitar confusiones
        REPO_URL=${{ secrets.ECR_REGISTRY }}/frontend
        docker build -t frontend-repo ./front_despacho
        docker tag frontend-repo:latest $REPO_URL:latest
        docker push $REPO_URL:latest

    - name: Despliegue en EC2 via SSM
      run: |
        # Definimos la URL completa para el comando SSM
        REPO_URL=${{ secrets.ECR_REGISTRY }}/frontend
        
        aws ssm send-command \
          --instance-ids ${{ secrets.EC2_FRONTEND_INSTANCE_ID }} \
          --document-name "AWS-RunShellScript" \
          --parameters "{\"commands\":[
            \"set -e\",
            \"export AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}\",
            \"export AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}\",
            \"export AWS_SESSION_TOKEN=${{ secrets.AWS_SESSION_TOKEN }}\",
            \"export AWS_DEFAULT_REGION=${{ secrets.AWS_REGION }}\",
            \"aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | sudo docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}\",
            \"sudo docker pull $REPO_URL:latest\",
            \"sudo docker stop frontend || true\",
            \"sudo docker rm frontend || true\",
            \"sudo docker run -d --name frontend -p 80:80 $REPO_URL:latest\"
          ]}"
